<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/icon.svg" type="image/svg+xml">
<title>Photo Gallery</title>
<style>
  :root {
    --warm: #c2410c;
    --cool: #0369a1;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.7;
    color: #222;
    background: #fff;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: #555;
    text-decoration: none;
    margin-bottom: 32px;
  }
  .back-link:hover { color: #000; }
  .back-link svg { width: 16px; height: 16px; fill: currentColor; }

  header { margin-bottom: 28px; }
  header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
  header p  { color: #666; font-size: 0.9rem; margin-top: 4px; }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: center;
  }
  .filter-btn {
    padding: 5px 16px;
    border-radius: 20px;
    border: 1.5px solid #ddd;
    background: #fff;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
    color: #444;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-btn:hover { border-color: #aaa; color: #111; }
  .filter-btn.active { color: #fff; border-color: transparent; }
  .filter-btn[data-filter="all"].active  { background: #222; }
  .filter-btn[data-filter="warm"].active { background: var(--warm); }
  .filter-btn[data-filter="cool"].active { background: var(--cool); }

  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-warm { background: var(--warm); }
  .dot-cool { background: var(--cool); }

  .btn-count {
    display: inline-block;
    font-size: 0.72rem;
    opacity: 0.7;
    font-variant-numeric: tabular-nums;
  }
  .filter-btn.active .btn-count { opacity: 0.85; }

  #count-label {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 16px;
    min-height: 1.2em;
  }

  /* Justified gallery container */
  #gallery-container {
    position: relative;
    width: 100%;
  }

  /* Each photo wrapper: absolutely positioned */
  .photo-wrap {
    position: absolute;
    overflow: hidden;
    border-radius: 3px;
    cursor: pointer;
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.25s ease;
  }
  .photo-wrap:hover img {
    transform: scale(1.04);
  }
  .color-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .photo-wrap:hover .color-bar {
    opacity: 1;
  }
  .color-bar-warm { background: var(--warm); }
  .color-bar-cool { background: var(--cool); }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #lightbox.open { display: flex; }
  #lightbox-img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 2px;
    display: block;
  }
  #lightbox-counter {
    color: rgba(255,255,255,0.6);
    font-size: 0.82rem;
    margin-top: 12px;
  }
  .lb-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    font-size: 2rem;
    width: 48px;
    height: 64px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 1001;
    font-family: inherit;
  }
  .lb-btn:hover { background: rgba(255,255,255,0.25); }
  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }
  #lb-close {
    position: fixed;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.65);
    font-size: 2rem;
    cursor: pointer;
    z-index: 1001;
    line-height: 1;
    font-family: inherit;
  }
  #lb-close:hover { color: #fff; }
</style>
</head>

// ── Justified layout algorithm ──
function computeLayout(items, containerWidth, targetRowHeight, gap) {
  const rows = [];
  let i = 0;
  let y = 0;
  while (i < items.length) {
    let j = i;
    let totalRatio = 0;
    while (j < items.length) {
      totalRatio += items[j].r;
      const rowWidth = totalRatio * targetRowHeight + gap * (j - i);
      j++;
      if (rowWidth >= containerWidth) break;
    }
    const isLastRow = j >= items.length;
    const rowItems = items.slice(i, j);
    const sumRatios = rowItems.reduce((s, it) => s + it.r, 0);
    const totalGap = gap * (rowItems.length - 1);
    const rowHeight = isLastRow
      ? targetRowHeight
      : (containerWidth - totalGap) / sumRatios;

    let x = 0;
    const row = [];
    rowItems.forEach((item) => {
      const w = Math.round(item.r * rowHeight);
      row.push({ item, x, y, w, h: Math.round(rowHeight) });
      x += w + gap;
    });
    rows.push(row);
    y += Math.round(rowHeight) + gap;
    i = j;
  }
  return { rows, totalHeight: y };
}

const container = document.getElementById('gallery-container');
const GAP = 6;

function getTargetRowHeight() {
  return window.innerWidth < 600 ? 140 : 220;

function renderGallery(items) {
  container.innerHTML = '';
  if (items.length === 0) {
    container.style.height = '0';
    return;
  }

  const containerWidth = container.offsetWidth;
  const targetRowHeight = getTargetRowHeight();
  const { rows, totalHeight } = computeLayout(items, containerWidth, targetRowHeight, GAP);

  container.style.height = totalHeight + 'px';

  // IntersectionObserver for lazy loading
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const wrap = entry.target;
        const img = wrap.querySelector('img');
        if (img && img.dataset.src) {
          img.src = img.dataset.src;
          delete img.dataset.src;
        }
        observer.unobserve(wrap);
      }
    });
  }, { rootMargin: '200px' });

  rows.forEach(row => {
    row.forEach(({ item, x, y, w, h }, k) => {
      const wrap = document.createElement('div');
      wrap.className = 'photo-wrap';
      wrap.style.left = x + 'px';
      wrap.style.top = y + 'px';
      wrap.style.width = w + 'px';
      wrap.style.height = h + 'px';

      const img = document.createElement('img');
      img.dataset.src = 'thumbs/' + item.file;
      img.alt = item.cat;
      img.loading = 'lazy';

      const bar = document.createElement('div');
      bar.className = 'color-bar color-bar-' + item.cat;

      // Find global index in visibleItems for lightbox
      const globalIdx = visibleItems.indexOf(item);
      wrap.addEventListener('click', () => openLightbox(globalIdx));

      wrap.appendChild(img);
      wrap.appendChild(bar);
      container.appendChild(wrap);
      observer.observe(wrap);
    });
  });
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === cat);
  });
  visibleItems = cat === 'all' ? MANIFEST : MANIFEST.filter(m => m.cat === cat);
  renderGallery(visibleItems);
  const label = document.getElementById('count-label');
  if (label) label.textContent = visibleItems.length + ' photos';
}

// ── Filter button click handlers ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => setFilter(btn.dataset.filter));
});

// Debounced resize handler
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => renderGallery(visibleItems), 120);
});

// ── Lightbox ──
const lb        = document.getElementById('lightbox');
const lbImg     = document.getElementById('lightbox-img');
const lbCounter = document.getElementById('lightbox-counter');

function openLightbox(idx) {
  lbIndex = idx;
  showLb();
  lb.classList.add('open');
}

function showLb() {
  lbImg.src = getOriginalUrl(visibleItems[lbIndex].file);
  lbCounter.textContent = (lbIndex + 1) + ' / ' + visibleItems.length;
}

document.getElementById('lb-close').addEventListener('click', () => lb.classList.remove('open'));
document.getElementById('lb-prev').addEventListener('click', () => {
  lbIndex = (lbIndex - 1 + visibleItems.length) % visibleItems.length;
  showLb();
});
document.getElementById('lb-next').addEventListener('click', () => {
  lbIndex = (lbIndex + 1) % visibleItems.length;
  showLb();
});
lb.addEventListener('click', e => {
  if (e.target === lb) lb.classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')      lb.classList.remove('open');
  if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + visibleItems.length) % visibleItems.length; showLb(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % visibleItems.length; showLb(); }
});

// ── Init ──
// Populate button counts
const warmCount = MANIFEST.filter(m => m.cat === 'warm').length;
const coolCount = MANIFEST.filter(m => m.cat === 'cool').length;
document.getElementById('count-all').textContent  = MANIFEST.length;
document.getElementById('count-warm').textContent = warmCount;
document.getElementById('count-cool').textContent = coolCount;
setFilter('all');
</script>
</body>
